
type: dagster_open_platform.lib.FivetranComponent

attributes:
  workspace:
    account_id: "{{ env('FIVETRAN_ACCOUNT_ID') }}"
    api_key: "{{ env('FIVETRAN_API_KEY') }}"
    api_secret: "{{ env('FIVETRAN_API_SECRET') }}"
  translation:
    key: "fivetran/{{ props.table.replace('.', '/') }}"
    group_name: "{{ group_from_db_and_schema(props) }}"
  connection_setup_tests_schedule: "0 0 * * *"
  excluded_connector_ids:
    - "appellant_unseated"
  connector_schedules:
    unfamiliar_eye: "0 * * * *"  # salesforce
    sobs_pall: "0 * * * *"  # github
    crushed_subsector: "0 * * * *"  # google drive
requirements:
  env:
    - FIVETRAN_ACCOUNT_ID
    - FIVETRAN_API_KEY
    - FIVETRAN_API_SECRET
