source: CLOUD_PRODUCTION_EU_MAIN
target: SLING_DB_EU_MAIN
defaults:
  mode: incremental
  object: '{stream_table}'
  update_key: id

streams:
  public.event_logs_view:
    sql: >
      with candidates as (
        select *
        from public.event_logs_partitioned
        where id > coalesce({incremental_value}, 0) and dagster_event_type is not null
        order by id
        limit 500000
      )
      select * from candidates
    meta:
      dagster:
        asset_key: sling.cloud_product_eu.event_logs
    object: cloud_product_eu.event_logs
