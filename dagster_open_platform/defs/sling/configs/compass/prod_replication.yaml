source: COMPASS_POSTGRES
target: SNOWFLAKE


streams:
  public.analytics:
    mode: incremental
    primary_key: 'id'
    object: 'sling.compass.analytics'
  
  public.bot_to_connections:
    mode: incremental
    primary_key: 'id'
    update_key: 'updated_at'
    object: 'sling.compass.bot_to_connections'
  
  public.connections:
    mode: incremental
    primary_key: 'id'
    update_key: 'updated_at'
    object: 'sling.compass.connections'
  
  public.organizations:
    mode: incremental
    primary_key: 'organization_id'
    object: 'sling.compass.organizations'
  
  public.usage_tracking:
    mode: incremental
    primary_key: 'id'
    update_key: 'updated_at'
    object: 'sling.compass.usage_tracking'

  public.referral_tokens:
    mode: incremental
    primary_key: 'id'
    update_key: 'created_at'
    object: 'sling.compass.referral_tokens'

  public.org_users:
    mode: incremental
    primary_key: 'id'
    update_key: 'created_at'
    object: 'sling.compass.org_users'

  public.org_channels:
    mode: incremental
    primary_key: 'id'
    update_key: 'created_at'
    object: 'sling.compass.org_channels'
  
  public.bot_instances:
    mode: incremental
    primary_key: 'id'
    update_key: 'updated_at'
    object: 'sling.compass.bot_instances'

  public.conversations:
    mode: incremental
    primary_key: 'conversation_id'
    update_key: 'created_at'
    object: 'sling.compass.conversations'

  public.conversation_messages:
    mode: incremental
    primary_key: ['conversation_id', 'message_sequence_id']
    update_key: 'timestamp'
    object: 'sling.compass.conversation_messages'
    sql: |
      select
        conversation_id,
        message_sequence_id,
        schema_version,
        timestamp,
        role,
        tool_name,
        is_automated,
        response_uuid
      from public.conversation_messages
      where timestamp IS NOT NULL
        and timestamp > coalesce({incremental_value}, to_timestamp('2020-01-01', 'YYYY-MM-DD'))

  public.conversation_votes:
    mode: incremental
    primary_key: 'id'
    update_key: 'updated_at'
    object: 'sling.compass.conversation_votes'

  public.conversation_health_scores:
    mode: incremental
    primary_key: 'id'
    update_key: 'evaluated_at'
    object: 'sling.compass.conversation_health_scores'

  public.agents:
    mode: incremental
    primary_key: 'id'
    update_key: 'updated_at'
    object: 'sling.compass.agents'

  public.agent_to_connections:
    mode: incremental
    primary_key: 'id'
    update_key: 'updated_at'
    object: 'sling.compass.agent_to_connections'

  public.channels:
    mode: incremental
    primary_key: 'id'
    update_key: 'updated_at'
    object: 'sling.compass.channels'

  public.onboarding_state:
    mode: incremental
    primary_key: 'id'
    update_key: 'updated_at'
    object: 'sling.compass.onboarding_state'

  public.agent_to_mcp_servers:
    mode: incremental
    primary_key: 'id'
    update_key: 'created_at'
    object: 'sling.compass.agent_to_mcp_servers'